# Several Unity editors, including at least 6000.1, still need libxml2.
name: libxml2
buildsystem: cmake-ninja
config-opts:
  - -DBUILD_SHARED_LIBS=ON
  - -DLIBXML2_WITH_PYTHON=OFF
  - -DLIBXML2_WITH_TESTS=OFF
  - -DLIBXML2_WITH_LZMA=OFF
cleanup:
  - /bin
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /lib/xml2Conf.sh
  - /lib/libxml2.so
  - /share/aclocal
  - /share/doc
  - /share/man
sources:
  - type: archive
    url: https://download.gnome.org/sources/libxml2/2.15/libxml2-2.15.3.tar.xz
    sha256: 78262a6e7ac170d6528ebfe2efccdf220191a5af6a6cd61ea4a9a9a5042c7a07
    x-checker-data:
      type: gnome
      name: libxml2
