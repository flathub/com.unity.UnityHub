# Several Unity editors, including at least 6000.1, still need libxml2.
name: libxml2
buildsystem: cmake-ninja
config-opts:
  - -DBUILD_SHARED_LIBS=ON
  - -DLIBXML2_WITH_PYTHON=OFF
  - -DLIBXML2_WITH_TESTS=OFF
  - -DLIBXML2_WITH_LZMA=OFF
cleanup:
  - /bin
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /lib/xml2Conf.sh
  - /lib/libxml2.so
  - /share/aclocal
  - /share/doc
  - /share/man
sources:
  - type: archive
    url: https://download.gnome.org/sources/libxml2/2.13/libxml2-2.13.9.tar.xz
    sha256: a2c9ae7b770da34860050c309f903221c67830c86e4a7e760692b803df95143a
    x-checker-data:
      type: gnome
      name: libxml2
